<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordenar Boxes</title>
    <style>
        .contenedor{
            position: relative;
            border: 3px dashed #333;
            width: 500px;
            height: 200px;
            text-align: center;
        }
        .box-1{
            position: absolute;
            background-color: red;
            top: 0%;
            left: 0px;
            width: 100px;
            padding: 15px;
            text-align: center;
        }

        .box-2{
            position: absolute;
            background-color: rgb(250, 126, 9);
            top: 0%;
            right: 0px;
            width: 100px;
            padding: 15px;
            text-align: center;
        }

        .box-3{
            position: absolute;
            background-color: yellow;
            bottom: 0%;
            left: 0px;
            width: 100px;
            padding: 15px;
            text-align: center;
        }

        .box-4{
            position: absolute;
            background-color: rgb(82, 255, 51);
            bottom: 0%;
            right: 0px;
            width: 100px;
            padding: 15px;
            text-align: center;
        }
        .box-5{
            position: absolute;
            background-color: rgb(13, 216, 247);
             bottom: 37%;
            right:37%;
            width: 100px;
            padding: 15px;
            text-align: center;

        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="box-1">1</div>
        <div class="box-2">2</div>
        <div class="box-3">3</div>
        <div class="box-4">4</div>
        <div class="box-5">5</div>
    </div>
</body>
</html>
